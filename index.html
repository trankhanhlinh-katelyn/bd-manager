<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BD Manager</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">BD</div>
        <div class="brand-text">
          <span class="brand-name">BD Manager</span>
          <span class="brand-sub">Business Development</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-view="pipeline" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="4" height="8" rx="1"/></svg>
          Pipeline
        </a>
        <a class="nav-item" data-view="tasks" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Công việc
        </a>
        <a class="nav-item" data-view="dashboard" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
      </nav>

      <div class="sidebar-quickstats" id="sidebar-quickstats">
        <!-- filled by JS -->
      </div>

      <div class="sidebar-footer">
        <button class="btn-icon-text" id="btn-export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Xuất dữ liệu
        </button>
      </div>
    </aside>

    <!-- ── MAIN CONTENT ── -->
    <div class="main-wrapper">

      <!-- Pipeline View -->
      <div id="view-pipeline" class="view active">
        <div class="view-header">
          <div>
            <h1 class="view-title">Pipeline</h1>
            <p class="view-sub" id="pipeline-summary">Đang tải...</p>
          </div>
          <button class="btn-primary" id="btn-add-deal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Thêm Deal
          </button>
        </div>
        <div class="pipeline-board" id="pipeline-board">
          <!-- columns rendered by JS -->
        </div>
      </div>

      <!-- Tasks View -->
      <div id="view-tasks" class="view">
        <div class="view-header">
          <div>
            <h1 class="view-title">Công việc</h1>
            <p class="view-sub" id="tasks-summary">Đang tải...</p>
          </div>
          <button class="btn-primary" id="btn-add-task">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Thêm Task
          </button>
        </div>

        <div class="tasks-toolbar">
          <div class="filter-group">
            <select id="filter-task-status" class="filter-select">
              <option value="">Tất cả trạng thái</option>
              <option value="todo">Chưa làm</option>
              <option value="in_progress">Đang làm</option>
              <option value="done">Hoàn thành</option>
            </select>
            <select id="filter-task-deal" class="filter-select">
              <option value="">Tất cả deal</option>
            </select>
            <select id="filter-task-priority" class="filter-select">
              <option value="">Tất cả ưu tiên</option>
              <option value="high">Cao</option>
              <option value="medium">Trung bình</option>
              <option value="low">Thấp</option>
            </select>
          </div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" id="search-tasks" placeholder="Tìm kiếm công việc..." />
          </div>
        </div>

        <div class="tasks-list" id="tasks-list">
          <!-- rendered by JS -->
        </div>
      </div>

      <!-- Dashboard View -->
      <div id="view-dashboard" class="view">
        <div class="view-header">
          <div>
            <h1 class="view-title">Dashboard</h1>
            <p class="view-sub" id="dashboard-date"></p>
          </div>
        </div>
        <div id="dashboard-content">
          <!-- rendered by JS -->
        </div>
      </div>

    </div><!-- /main-wrapper -->
  </div><!-- /app-layout -->

  <!-- ── MODAL OVERLAY ── -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box">
      <!-- dynamic content -->
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── SCRIPTS ── -->
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/pipeline.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
